[providers]
  php = "8.3"
  node = "20"

[phases.setup]
  nixPkgs = ["...", "php83", "php83Packages.composer", "nodejs_20", "npm"]

[phases.build]
  cmds = [
    "composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader",
    "npm install",
    "npm run build"
  ]

[start]
  cmd = "php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=$PORT"
